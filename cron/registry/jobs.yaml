    runtime_notes:
      - follows the existing Notion candidate git-sync pattern
      - reads only /home/yk/brain-linux/research/literature/*.md via SECOND_BRAIN_DIR
      - does not commit unrelated dirty files from the second-brain checkout
      - emits no-change output when GitHub already has the same literature notes

