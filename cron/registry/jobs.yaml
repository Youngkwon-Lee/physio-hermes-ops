    runtime_name: "매일 05:30 AI 뉴스 브리프"
    operator_label: "[Home desktop Hermes] 05:30 AI News Briefing"
    purpose: Summarize high-signal AI news relevant to rehab, clinical AI, agent operations, and knowledge workflows.
    schedule: "30 5 * * *"
    mode: agent
    status: active
    deliver_label: "discord/news/AI 뉴스 토론"
    output_type: briefing
    prompt_file: "cron/prompts/daily-ai-news-brief.md"
    enabled_toolsets: [web, terminal, file]
    quality_targets:
      - concise
      - source-linked
      - action-oriented

