version: 0.1
updated_at: 2026-06-11
owner: Youngkwon-Lee
purpose: Canonical registry for public-safe Hermes cron job definitions used in physio operations.
notes:
  - This file is documentation-first and should not contain secrets, tokens, or private message contents.
  - Discord delivery targets are intentionally abstracted to human-readable labels rather than raw private IDs.
  - Runtime truth still lives in Hermes cron state; this registry is the version-controlled source of intent.
  - Operator-facing labels should prefer `[Home desktop Hermes] HH:MM <what>` or `[Home desktop Hermes] every <interval> <what>`.

jobs:
  - name: daily-ai-news-briefing
    operator_label: "[Home desktop Hermes] 05:30 AI News Briefing"
    purpose: Summarize high-signal AI news relevant to rehab, clinical AI, agent operations, and knowledge workflows.
    schedule: "30 5 * * *"
    mode: agent
    status: active
    deliver_label: "discord/news/AI 뉴스 토론"
    output_type: briefing
    prompt_file: "cron/prompts/daily-ai-news-brief.md"
    enabled_toolsets: [web, terminal, file]
    quality_targets:
      - concise
      - source-linked
      - action-oriented

  - name: daily-ai-news-discussion-kickoff
    purpose: Convert the morning AI news brief into actionable discussion questions and experiment prompts.
    schedule: "30 7 * * *"
    mode: agent
    status: active
    deliver_label: "discord/news/AI 뉴스 토론"
    output_type: kickoff
    prompt_file: "cron/prompts/daily-ai-news-discussion-kickoff.md"
    enabled_toolsets: [session_search, file]
    depends_on:
      - daily-ai-news-briefing

  - name: daily-rehab-ai-research-brief
    operator_label: "[Home desktop Hermes] 06:00 Rehab AI Research Brief"
    purpose: Deliver a daily research brief focused on physical therapy, rehabilitation, multimodal AI, and clinical relevance.
    schedule: "0 6 * * *"
    mode: agent
    status: active
    deliver_label: "discord/research/물리치료·재활 일일 브리핑 토론장"
    output_type: research_brief
    prompt_file: "cron/prompts/daily-rehab-ai-research-brief.md"
    enabled_toolsets: [web, terminal, file]

  - name: overnight-pt-morning-summary
    purpose: Summarize overnight PT/rehab/research discussions into a short morning handoff.
    schedule: "5 7 * * 1-5"
    mode: agent
    status: active
    deliver_label: "discord/research/연구 토론방"
    output_type: handoff
    prompt_file: "cron/prompts/overnight-pt-morning-summary.md"
    enabled_toolsets: [session_search, file]

  - name: daily-calendar-mail-brief
    operator_label: "[Home desktop Hermes] 07:30 Calendar + Mail Brief"
    purpose: Combine calendar context and important unread mail into a single operational morning brief.
    schedule: "30 7 * * 1-5"
    mode: script
    status: active
    deliver_label: "discord/비서/아침 일정·메일 요약"
    output_type: ops_brief
    script_file: "cron/scripts/daily_calendar_mail_brief.py"
    storage_notes:
      - writes public-safe summary to docs or wiki layer when needed
      - should not commit raw personal email contents

  - name: home-rehab-morning-brief
    purpose: Present today's home-rehab schedule in a compact action-ready morning format.
    schedule: "0 9 * * *"
    mode: agent
    status: active
    deliver_label: "discord/비서/방문재활 일정 관리"
    output_type: schedule_brief
    prompt_file: "cron/prompts/home-rehab-morning-brief.md"
    enabled_toolsets: [terminal, file]

  - name: home-rehab-lunch-recommendation
    purpose: Recommend lunch options based on the day's home-rehab route and prior preferences.
    schedule: "0 8 * * *"
    mode: agent
    status: needs_review
    deliver_label: "discord/비서/맛집 추천 기록"
    output_type: recommendation
    prompt_file: "cron/prompts/home-rehab-lunch-recommendation.md"
    enabled_toolsets: [web, terminal, file]
    known_issue: recent runtime error observed; verify before relying on output

  - name: weekly-pt-kpi-brief
    purpose: Weekly KPI summary for PT MVP operations.
    schedule: "0 9 * * 1"
    mode: agent
    status: active
    deliver_label: "discord/사업/지원사업 회의실"
    output_type: kpi_brief
    prompt_file: "cron/prompts/weekly-pt-kpi-brief.md"
    enabled_toolsets: [terminal, file]

  - name: weekly-zotero-literature-ingest
    operator_label: "[Home desktop Hermes] Mon 09:00 Zotero Literature Ingest"
    purpose: Create missing second-brain Zotero literature source notes from a Zotero-capable always-on runtime.
    schedule: "0 9 * * 1"
    mode: agent
    status: active
    deliver_label: "discord/비서/장기기억 기록 도우미"
    output_type: maintenance
    prompt_file: "cron/prompts/weekly-zotero-literature-ingest.md"
    enabled_toolsets: [terminal, file]
    runtime_notes:
      - installed on desktop Hermes as df985f8b88e3 on 2026-06-18
      - should run on desktop Hermes or another always-on environment, not MacBook Codex local cron
      - requires access to the home desktop automation canonical checkout at /home/yk/brain-linux via SECOND_BRAIN_DIR
      - current local implementation uses Zotero Desktop local API through /home/yk/.local/bin/codex-zotero.py
      - Windows scheduled task CodexZoteroInteractive starts Zotero in the interactive desktop session when needed
      - cloud deployment requires Zotero Web API adaptation

  - name: second-brain-zotero-literature-git-sync
    operator_label: "[Home desktop Hermes] Mon 09:15 Zotero Literature Git Sync"
    purpose: Push Zotero-generated second-brain literature notes to GitHub using a clean temporary clone.
    schedule: "15 9 * * 1"
    mode: script
    status: active
    deliver_label: "local-only"
    output_type: maintenance
    script_file: "cron/scripts/zotero_literature_git_sync.py"
    depends_on:
      - weekly-zotero-literature-ingest
    runtime_notes:
      - follows the existing Notion candidate git-sync pattern
      - reads only /home/yk/brain-linux/research/literature/*.md via SECOND_BRAIN_DIR
      - does not commit unrelated dirty files from the second-brain checkout
      - emits no-change output when GitHub already has the same literature notes

  - name: biz-support-radar-daily
    purpose: Daily scan of startup/government support programs relevant to rehabilitation, healthcare AI, and adjacent startup opportunities.
    schedule: "0 9 * * *"
    mode: agent
    status: active
    deliver_label: "discord/사업/지원사업 레이더 운영 (일일/크론) v2"
    output_type: business_radar
    prompt_file: "cron/prompts/biz-support-radar-daily.md"
    enabled_toolsets: [web, file]

  - name: daily-conversation-curator
    operator_label: "[Home desktop Hermes] 23:00 Conversation Curator"
    purpose: Curate long-term-value conversation items for memory and knowledge promotion.
    schedule: "0 23 * * *"
    mode: agent
    status: active
    deliver_label: "discord/비서/장기기억 기록 도우미"
    output_type: curator
    prompt_file: "cron/prompts/daily-conversation-curator.md"
    enabled_toolsets: [session_search, memory]

  - name: daily-discord-digest
    operator_label: "[Home desktop Hermes] 23:35 Discord Digest"
    purpose: Produce an end-of-day digest of meaningful Discord conversations and decisions.
    schedule: "35 23 * * *"
    mode: agent
    status: active
    deliver_label: "discord/비서/하루 대화 요약 리포터"
    output_type: digest
    prompt_file: "cron/prompts/daily-discord-digest.md"
    enabled_toolsets: [session_search, file]

  - name: calendar-auto-classify
    purpose: Apply lightweight automated classification to calendar items.
    schedule: "10 23 * * *"
    mode: script
    status: active
    deliver_label: "local-only"
    output_type: maintenance
    script_file: "cron/scripts/calendar_auto_classify.py"

  - name: ensure-kinelo-8888-server
    purpose: Watchdog job to keep the local Kinelo service on port 8888 alive.
    schedule: "every 5m"
    mode: script
    status: active
    deliver_label: "local-only"
    output_type: watchdog
    script_file: "cron/scripts/ensure-kinelo-8888.sh"

  - name: second-brain-safe-sync-watchdog
    operator_label: "[Home desktop Hermes] every 30m Second-brain Safe Sync Watchdog"
    purpose: Keep the desktop second-brain checkout fresh without pulling over local ingest or Obsidian changes.
    schedule: "every 30m"
    mode: script
    status: active
    deliver_label: "discord/비서/장기기억 기록 도우미"
    output_type: watchdog
    script_file: "cron/scripts/second_brain_safe_sync.py"
    runtime_notes:
      - silent when the repo is clean and already up to date
      - runs git fetch first, then pulls only when the working tree is clean and strictly behind upstream
      - reports dirty, ahead, diverged, fetch failed, pull failed, or validation failed states without modifying files
      - default repo path is /home/yk/brain-linux; override with SECOND_BRAIN_DIR if needed

  - name: hermes-ops-watchdog
    operator_label: "[Home desktop Hermes] every 10m Hermes Ops Watchdog"
    purpose: Lightweight Hermes runtime watchdog for gateway health, cron error state, and overdue active jobs.
    schedule: "every 10m"
    mode: script
    status: active
    deliver_label: "discord/비서/장기기억 기록 도우미"
    output_type: watchdog
    script_file: "cron/scripts/hermes_ops_watchdog.py"
    runtime_notes:
      - silent-by-default; emits output only when an issue is detected
      - checks gateway state via systemd user unit status
      - checks active cron jobs for error markers and overdue next_run_at
