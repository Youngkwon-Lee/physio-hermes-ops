    schedule: "every 10m"
    mode: script
    status: active
    deliver_label: "discord/비서/장기기억 기록 도우미"
    output_type: watchdog
    script_file: "cron/scripts/hermes_ops_watchdog.py"
    runtime_notes:
      - silent-by-default; emits output only when an issue is detected
      - checks gateway state via systemd user unit status
      - checks active cron jobs for error markers and overdue next_run_at

