  - name: second-brain-safe-sync-watchdog
    runtime_name: "30분마다 second-brain 안전 pull"
    operator_label: "[Home desktop Hermes] every 30m Second-brain Safe Sync Watchdog"
    purpose: Keep the desktop second-brain checkout fresh without pulling over local ingest or Obsidian changes.
    schedule: "*/30 * * * *"
    mode: script
    status: active
    deliver_label: "discord/비서/장기기억 기록 도우미"
    output_type: watchdog
    script_file: "cron/scripts/second_brain_safe_sync.py"
    runtime_notes:
      - silent when the repo is clean and already up to date
      - runs git fetch first, then pulls only when the working tree is clean and strictly behind upstream
      - reports dirty, ahead, diverged, fetch failed, pull failed, or validation failed states without modifying files
      - default repo path is /home/yk/brain-linux; override with SECOND_BRAIN_DIR if needed

