title = "physio-hermes-ops gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "generic-env-secret-assignment"
description = "Generic secret-like environment or config assignment"
regex = '''(?i)(?:api[_-]?key|secret|token|password|client[_-]?secret|private[_-]?key|access[_-]?token)\b\s*[:=]\s*['"]([^'"\s]{16,})['"]'''
secretGroup = 1
keywords = [
  "api_key",
  "apikey",
  "client_secret",
  "password",
  "private_key",
  "secret",
  "token",
]
tags = ["secret", "generic"]

    [[rules.allowlists]]
    description = "Public-safe placeholders and shell variable references"
    regexTarget = "secret"
    regexes = [
      '''(?i)^(?:<[^>]+>|replace[_-]?with.*|example.*|dummy.*|test.*|placeholder.*|changeme.*)$''',
      '''^\$[A-Z_][A-Z0-9_]*$''',
      '''^\$\{[A-Z_][A-Z0-9_]*\}$''',
    ]

[[rules]]
id = "database-url-assignment"
description = "Database URL assignment with embedded credentials"
regex = '''(?i)(?:database_url|postgres_url|postgresql_url)\b\s*[:=]\s*['"]((?:postgres|postgresql)://[^'"]+)['"]'''
secretGroup = 1
keywords = ["database_url", "postgres_url", "postgresql_url"]
tags = ["secret", "database"]

[[allowlists]]
description = "Generated public read models and non-secret runtime state"
paths = [
  '''^dashboard/derived/''',
  '''^dashboard/cron_status\.json$''',
  '''^lineage/''',
  '''^ops_knowledge/00_raw/\.gitkeep$''',
]
